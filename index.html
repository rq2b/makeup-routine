<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Рутина</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://github.githubassets.com" />
    <link rel="preload" as="video" href="media/1.mp4" type="video/mp4" />
  </head>
  <body>
    <main class="page">
      <ol class="routine">
        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="auto"
            poster="media/1-poster.webp"

          </video>
        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/2-poster.webp"
          >
            <source src="media/2.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/3-poster.webp"
          >

        </li>

        <li>
          <video
            width="1080"

            loop

          >
            <source src="media/4.mp4" type="video/mp4" />

        </li>

        <li>

            loop

        <li>

          >
            <source src="media/5-1.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/6-poster.webp"
          >
            <source src="media/6.mp4" type="video/mp4" />

        </li>

        <li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/8-poster.webp"
          >
            <source src="media/8.mp4" type="video/mp4" />
          </video>
        </li>
      </ol>
    </main>
    <script>
      const observer = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            const video = entry.target;

            if (entry.intersectionRatio >= 0.6) {
              video.play().catch(() => {});
            } else {
              video.pause();
            }
          }
        },
        {
          threshold: [0, 0.25, 0.6, 0.9],
        },
      );

      document
        .querySelectorAll("video")
        .forEach((video) => observer.observe(video));
    </script>
  </body>
</html>
