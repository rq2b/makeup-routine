<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Рутина</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="page">
      <ol class="routine">
        <li>
          <video autoplay muted loop playsinline preload="auto">
            <source src="media/1.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/2.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/3.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/4.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/5.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/5-1.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/6.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/7.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video autoplay muted loop playsinline preload="metadata">
            <source src="media/8.mp4" type="video/mp4" />
          </video>
        </li>
      </ol>
    </main>
    <script>
      const observer = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            const video = entry.target;

            if (entry.intersectionRatio >= 0.4) {
              video.play().catch(() => {});
            } else {
              video.pause();
            }
          });
        },
        {
          threshold: [0, 0.4],
        },
      );

      document
        .querySelectorAll("video")
        .forEach((video) => observer.observe(video));
    </script>
  </body>
</html>
