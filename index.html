<!doctype html>
<html lang="ru">
  <head>

    <meta name="color-scheme" content="dark" />
    <title>Рутина</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="preconnect" href="https://github.githubassets.com" />
    <link rel="preload" as="video" href="media/1.mp4" type="video/mp4" />
  </head>
  <body>
    <main class="page">
      <ol class="routine">
        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="auto"

        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/2-poster.webp"
          >
            <source src="media/2.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/3-poster.webp"
          >
            <source src="media/3.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video
            width="1080"

        <li>

        <li>

          >
            <source src="media/5-1.mp4" type="video/mp4" />
          </video>
        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/6-poster.webp"
          >
            <source src="media/6.mp4" type="video/mp4" />

        <li>

          >
            <source src="media/7.mp4" type="video/mp4" />

        </li>

        <li>
          <video
            width="1080"
            height="1920"
            muted
            loop
            playsinline
            preload="metadata"
            poster="media/8-poster.webp"
          >
            <source src="media/8.mp4" type="video/mp4" />
          </video>
        </li>
      </ol>
    </main>
    <script>
      const PLAY_THRESHOLD = 0.6;

      const videos = document.querySelectorAll("video");

      const observer = new IntersectionObserver(
        (entries) => {
          for (const entry of entries) {
            const video = entry.target;

            if (entry.intersectionRatio >= PLAY_THRESHOLD) {
              video.play().catch(() => {});
            } else {
              video.pause();
            }
          }
        },
        {
          threshold: PLAY_THRESHOLD,
        },
      );

      videos.forEach((video) => observer.observe(video));

      document.addEventListener("visibilitychange", () => {
        if (document.hidden) {
          videos.forEach((video) => video.pause());
          return;
        }

        videos.forEach((video) => {
          const rect = video.getBoundingClientRect();

          const visibleHeight =
            Math.min(rect.bottom, window.innerHeight) - Math.max(rect.top, 0);

          const ratio = visibleHeight / rect.height;

          if (ratio >= PLAY_THRESHOLD) {
            video.play().catch(() => {});
          }
        });
      });
    </script>
  </body>
</html>
